<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>簡単貯金アプリ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            /* 背景をさらに薄いクリーム色に設定 */
            background-color: #fffef2; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333333;
        }
        .app-container {
            background-color: white;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 85%;
            max-width: 400px;
        }
        
        /* 上部ラベル：サイズを2倍（約28px）に */
        .main-label {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        /* 中部：これまでに / ¥x / 貯金できたよ！ */
        .amount-section {
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .total-amount {
            display: block; /* 改行させるため */
            font-size: 48px;
            font-weight: bold;
            color: #000000;
            margin: 10px 0;
        }

        /* 貯金ボタン：中身を縦並びに */
        .save-button {
            background-color: #a9d479;
            color: #000000;
            border: none;
            padding: 20px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            display: flex;
            flex-direction: column; /* 縦並びにする */
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(169, 212, 121, 0.3);
            transition: transform 0.1s;
        }
        .save-button:active {
            transform: scale(0.96);
        }
        .button-text-small {
            font-size: 16px;
            margin-bottom: 5px;
        }
        /* ¥500の部分：サイズを2倍（約32px）に */
        .button-text-large {
            font-size: 32px;
            font-weight: bold;
        }

        .reset-button {
            background-color: #e6a23c;
            color: #000000;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
        }

        /* ポップアップ用スタイル（前回と同じ） */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; display: none;
        }
        .modal-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px;
            width: 280px; text-align: center;
        }
        .modal-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .modal-button { border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal-button-no { background-color: #999999; color: white; }
        .modal-button-yes { background-color: #e6a23c; color: white; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-label">
            高級ドリンクをやめて<br>貯金をしよう
        </div>
        
        <div class="amount-section">
            これまでに
            <span class="total-amount">¥<span id="balance">0</span></span>
            貯金できたよ！
        </div>
        
        <button class="save-button" onclick="addMoney()">
            <span class="button-text-small">今日も買わなかった</span>
            <span class="button-text-large">¥500</span>
        </button>
        
        <button class="reset-button" onclick="openResetModal()">リセット</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal-container">
            <div class="modal-title">本当にリセットしますか？</div>
            <div class="modal-buttons">
                <button class="modal-button modal-button-no" onclick="closeModal()">いいえ</button>
                <button class="modal-button modal-button-yes" onclick="resetBalanceConfirmed()">はい</button>
            </div>
        </div>
    </div>

    <script>
        let currentBalance = parseInt(localStorage.getItem('mySavingAppBalance')) || 0;
        const balanceDisplay = document.getElementById('balance');
        balanceDisplay.innerText = currentBalance.toLocaleString();
        const overlay = document.getElementById('overlay');

        function addMoney() {
            currentBalance += 500;
            balanceDisplay.innerText = currentBalance.toLocaleString();
            localStorage.setItem('mySavingAppBalance', currentBalance);
        }

        function openResetModal() { overlay.style.display = 'block'; }
        function closeModal() { overlay.style.display = 'none'; }
        function resetBalanceConfirmed() {
            currentBalance = 0;
            balanceDisplay.innerText = '0';
            localStorage.setItem('mySavingAppBalance', 0);
            closeModal();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
